version: '3.8'

services:
  redis:
    image: redis:alpine
    deploy:
      restart_policy:
        condition: any
    volumes:
      - redis_data:/data
    networks:
      - inoovaweb

  ia-disparo-service:
    image: emerald-connect-ia-disparo-service:latest
    build: 
      context: ./vps-backend
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=inoovaweb"
        - "traefik.http.routers.ia-disparo-api.rule=Host(`api-iadisparo.inoovaweb.cloud`)"
        - "traefik.http.routers.ia-disparo-api.entrypoints=websecure"
        - "traefik.http.routers.ia-disparo-api.tls.certresolver=myresolver"
        - "traefik.http.services.ia-disparo-api.loadbalancer.server.port=4000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - SUPABASE_URL=https://odkoigujqlxudhzriusv.supabase.co
      - SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ka29pZ3VqcWx4dWRoenJpdXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Nzg3MDYsImV4cCI6MjA5MDE1NDcwNn0.dnVnzzcn1TYxlN3XKjluvvaGEGmAhVUjKqfkSAZeYh8
    depends_on:
      - redis
    networks:
      - inoovaweb

  ia-disparo-frontend:
    image: emerald-connect-ia-disparo-frontend:latest
    build:
      context: .
      dockerfile: Dockerfile
      args:
        - VITE_SUPABASE_URL=https://odkoigujqlxudhzriusv.supabase.co
        - VITE_SUPABASE_ANON_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ka29pZ3VqcWx4dWRoenJpdXN2Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzQ1Nzg3MDYsImV4cCI6MjA5MDE1NDcwNn0.dnVnzzcn1TYxlN3XKjluvvaGEGmAhVUjKqfkSAZeYh8
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=inoovaweb"
        - "traefik.http.routers.ia-disparo-front.rule=Host(`iadisparo.inoovaweb.cloud`)"
        - "traefik.http.routers.ia-disparo-front.entrypoints=websecure"
        - "traefik.http.routers.ia-disparo-front.tls.certresolver=myresolver"
        - "traefik.http.services.ia-disparo-front.loadbalancer.server.port=80"
    networks:
      - inoovaweb

networks:
  inoovaweb:
    external: true

volumes:
  redis_data:
