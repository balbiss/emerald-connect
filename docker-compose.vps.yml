version: '3.8'

services:
  redis:
    image: redis:alpine
    deploy:
      restart_policy:
        condition: any
    volumes:
      - redis_data:/data
    networks:
      - inoovaweb

  ia-disparo-service:
    image: node:18-alpine
    working_dir: /app
    command: sh -c "npm install --production && node src/index.js"
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=inoovaweb"
        - "traefik.http.routers.ia-disparo-api.rule=Host(`api-iadisparo.inoovaweb.cloud`)"
        - "traefik.http.routers.ia-disparo-api.entrypoints=websecure"
        - "traefik.http.routers.ia-disparo-api.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ia-disparo-api.loadbalancer.server.port=4000"
    environment:
      - REDIS_URL=redis://redis:6379
      - PORT=4000
      - SUPABASE_URL=https://odkoigujqlxudhzriusv.supabase.co
      - SUPABASE_SERVICE_KEY=eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im9ka29pZ3VqcWx4dWRoenJpdXN2Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc3NDU3ODcwNiwiZXhwIjoyMDkwMTU0NzA2fQ.R3qUb0PE78cNPa2qci7ogo-K-VLWlcdW5wL9nHbLmeI
    volumes:
      - /opt/emerald-connect/vps-backend:/app
    depends_on:
      - redis
    networks:
      - inoovaweb

  ia-disparo-frontend:
    image: nginx:stable-alpine
    deploy:
      restart_policy:
        condition: any
      labels:
        - "traefik.enable=true"
        - "traefik.docker.network=inoovaweb"
        - "traefik.http.routers.ia-disparo-front.rule=Host(`iadisparo.inoovaweb.cloud`)"
        - "traefik.http.routers.ia-disparo-front.entrypoints=websecure"
        - "traefik.http.routers.ia-disparo-front.tls.certresolver=letsencryptresolver"
        - "traefik.http.services.ia-disparo-front.loadbalancer.server.port=80"
    volumes:
      - /opt/emerald-connect/dist:/usr/share/nginx/html:ro
      - /opt/emerald-connect/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    networks:
      - inoovaweb

networks:
  inoovaweb:
    external: true

volumes:
  redis_data:
